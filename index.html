<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Reporte de Incidencias</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #d1d1d6;
      --text: #1c1c1e;
      --muted: #6c6c70;
      --accent: #a100ff;
      --accent-dark: #7b00c4;
      --success-bg: #f0faf4;
      --success-border: #34c759;
      --success-text: #1a7a3c;
      --error-bg: #fff0f0;
      --error-border: #ff3b30;
      --error-text: #7a0000;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    header {
      width: 100%;
      max-width: 480px;
      margin-bottom: 28px;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-top: 6px;
      line-height: 1.2;
      color: var(--text);
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      max-width: 480px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      padding: 14px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      resize: vertical;
      line-height: 1.5;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: #aeaeb2;
    }

    textarea:disabled {
      opacity: 0.5;
    }

    .foto-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 16px;
    }

    .btn-foto {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #d1d1d6;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-appearance: none;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-foto:active { background: #b8b8bd; }
    .btn-foto:disabled { opacity: 0.45; cursor: not-allowed; }

    .foto-label {
      font-size: 14px;
      color: var(--muted);
    }

    .foto-preview-wrap {
      position: relative;
      flex-shrink: 0;
      width: 56px;
      height: 56px;
    }

    .foto-preview-wrap img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: block;
    }

    .btn-quitar-foto {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--error-border);
      color: #fff;
      border: 2px solid #fff;
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-appearance: none;
      padding: 0;
    }

    .btn-primary {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      -webkit-appearance: none;
      min-height: 52px;
    }

    .btn-primary:active { background: var(--accent-dark); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .alerta {
      display: none;
      width: 100%;
      max-width: 480px;
      margin-top: 16px;
      padding: 16px;
      border-radius: var(--radius);
      border: 1.5px solid;
      font-size: 15px;
      line-height: 1.5;
    }

    .alerta.visible { display: block; }

    .alerta.success {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    .alerta.error {
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
    }

    .alerta-titulo {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .cargando-txt {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-top: 12px;
      display: none;
    }

    .cargando-txt.visible { display: block; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Accenture</div>
    <h1>Reporte de incidencias</h1>
    <p class="subtitle">Describí el problema físico que encontraste en la oficina.</p>
  </header>

  <div class="card">
    <label for="reporte">Descripción del problema</label>
    <textarea
      id="reporte"
      placeholder="Ej: la silla de la sala 112 tiene una rueda rota"
      maxlength="500"
    ></textarea>

    <div class="foto-row">
      <button type="button" class="btn-foto" id="btn-foto" onclick="document.getElementById('input-foto').click()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6c6c70" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
      <input type="file" id="input-foto" accept="image/*" style="display:none">
      <div class="foto-preview-wrap" id="foto-preview-wrap" style="display:none">
        <img id="foto-preview" src="" alt="Foto adjunta">
        <button type="button" class="btn-quitar-foto" onclick="quitarFoto()">×</button>
      </div>
      <span class="foto-label" id="foto-label">Agregar foto (opcional)</span>
    </div>

    <button class="btn-primary" id="btn-reportar" onclick="enviarReporte()">Reportar</button>
  </div>

  <p class="cargando-txt" id="cargando">Enviando…</p>

  <div class="alerta" id="alerta">
    <div class="alerta-titulo" id="alerta-titulo"></div>
    <div id="alerta-cuerpo"></div>
  </div>

  <script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzsMFqhsJi0mionxmAHizqCAHBhlC8sX55kRg2HHkQsedUXPBoFZixoTPyfcZ-TV14s/exec";

    let fotoBase64 = null;

    function setEstado(cargando) {
      const btn = document.getElementById("btn-reportar");
      const btnFoto = document.getElementById("btn-foto");
      const txt = document.getElementById("cargando");
      const textarea = document.getElementById("reporte");
      btn.disabled = cargando;
      btnFoto.disabled = cargando;
      textarea.disabled = cargando;
      txt.classList.toggle("visible", cargando);
    }

    function mostrarAlerta(tipo, titulo, cuerpo) {
      const alerta = document.getElementById("alerta");
      alerta.className = "alerta visible " + tipo;
      document.getElementById("alerta-titulo").textContent = titulo;
      document.getElementById("alerta-cuerpo").textContent = cuerpo;
    }

    function ocultarAlerta() {
      document.getElementById("alerta").className = "alerta";
    }

    // Comprime la foto en el celular antes de mandarla (más rápido y liviano)
    function comprimirImagen(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const maxAncho = 1000;
            let w = img.width;
            let h = img.height;
            if (w > maxAncho) {
              h = Math.round(h * (maxAncho / w));
              w = maxAncho;
            }
            const canvas = document.createElement("canvas");
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", 0.6));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Al elegir foto (cámara o galería, según lo que elija el usuario en el menú nativo), la comprime y muestra preview
    document.getElementById("input-foto").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        fotoBase64 = await comprimirImagen(file);
        document.getElementById("foto-preview").src = fotoBase64;
        document.getElementById("foto-preview-wrap").style.display = "block";
        document.getElementById("btn-foto").style.display = "none";
        document.getElementById("foto-label").textContent = "Foto lista";
      } catch (err) {
        fotoBase64 = null;
      }
    });

    // Saca la foto elegida
    function quitarFoto() {
      fotoBase64 = null;
      document.getElementById("input-foto").value = "";
      document.getElementById("foto-preview-wrap").style.display = "none";
      document.getElementById("btn-foto").style.display = "flex";
      document.getElementById("foto-label").textContent = "Agregar foto (opcional)";
    }

    async function enviarReporte() {
      const texto = document.getElementById("reporte").value.trim();
      if (!texto) {
        mostrarAlerta("error", "Campo vacío", "Escribí el problema antes de reportar.");
        return;
      }

      ocultarAlerta();
      setEstado(true);

      try {
        // CAMBIO: se saca "foto" de este payload — el backend nunca la usaba acá,
        // solo sumaba peso y demora a la request que tiene que ser instantánea
        const fd1 = new FormData();
        fd1.append("data", JSON.stringify({ accion: "guardar", texto }));
        const res1 = await fetch(BACKEND_URL, { method: "POST", body: fd1 });
        const data1 = await res1.json();

        if (!data1.ok) {
          mostrarAlerta("error", "Error", data1.error || "Algo falló. Intentá de nuevo.");
          return;
        }

        // Se guarda la foto en una variable local ANTES de quitarFoto(),
        // porque quitarFoto() pone fotoBase64 en null y la necesitamos para el fetch 2
        const fotoParaEnviar = fotoBase64;

        mostrarAlerta("success", "✅ Reportado correctamente", "El problema quedó registrado.");
        document.getElementById("reporte").value = "";
        quitarFoto();

        // Paso 2 — dispara la foto + el análisis de duplicados en segundo plano, sin esperar (fire-and-forget)
        const fd2 = new FormData();
        fd2.append("data", JSON.stringify({ accion: "gemini", texto, id: data1.id, fila: data1.fila, foto: fotoParaEnviar }));
        fetch(BACKEND_URL, { method: "POST", body: fd2 }).catch(() => {});

      } catch (err) {
        mostrarAlerta("error", "Error de conexión", "No se pudo conectar. Revisá tu internet e intentá de nuevo.");
      } finally {
        setEstado(false);
      }
    }
  </script>

</body>
</html>
